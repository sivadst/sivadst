name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-3d
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: sivadst

      - name: Commit & Push Changes
        run: |
          git config --local user.email "hello@sivadst.dev"
          git config --local user.name "sivadst"
          git add -A .
          git diff --staged --quiet || (git commit -m "docs: Update 3D contribution graph [skip ci]" && git push)
